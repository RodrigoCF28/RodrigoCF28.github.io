<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Un pequeño rincón</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(to right, #fceabb, #f8b500);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
}

/* partículas */
.particle {
    position: absolute;
    width: 6px;
    height: 6px;
    background: rgba(0, 123, 255, 0.6);
    border-radius: 50%;
    animation: float 10s linear infinite;
}

@keyframes float {
    from { transform: translateY(100vh); opacity: 0; }
    10% { opacity: 1; }
    to { transform: translateY(-10vh); opacity: 0; }
}

/* carta */
.carta {
    position: relative;
    background: white;
    padding: 40px;
    border-radius: 20px;
    width: 350px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    text-align: center;
    z-index: 2;
    animation: aparecer 1.5s ease;
}

h1 { margin-bottom: 15px; }

p {
    font-size: 1.1em;
    opacity: 0;
    transform: translateY(20px);
    transition: 0.6s;
}

.visible {
    opacity: 1;
    transform: translateY(0);
}

/* botón */
button {
    margin-top: 20px;
    background-color: #333;
    color: white;
    border: none;
    padding: 12px 20px;
    font-size: 1em;
    border-radius: 20px;
    cursor: pointer;
}

/* código dinámico */
.code {
    margin-top: 15px;
    font-family: monospace;
    background: #111;
    color: #00ff9c;
    padding: 15px;
    border-radius: 10px;
    text-align: left;
    min-height: 80px;
    font-size: 0.9em;
}

/* final */
.final {
    margin-top: 20px;
    font-size: 1.5em;
    opacity: 0;
    transition: 1s;
}

.mostrar-final {
    opacity: 1;
}

/* móvil */
@media (max-width: 600px) {
    .carta {
        width: 90%;
        padding: 30px;
    }

    p { font-size: 1.3em; }

    button {
        font-size: 1.2em;
        padding: 15px 25px;
    }
}

@keyframes aparecer {
    from { opacity: 0; transform: scale(0.9); }
    to { opacity: 1; transform: scale(1); }
}
</style>
</head>

<body>

<script>
// partículas
for (let i = 0; i < 40; i++) {
    let p = document.createElement("div");
    p.className = "particle";
    p.style.left = Math.random() * 100 + "vw";
    p.style.animationDuration = (6 + Math.random() * 6) + "s";
    p.style.opacity = Math.random();
    document.body.appendChild(p);
}
</script>

<div class="carta">
    <h1>Un pequeño rincón</h1>

    <p id="msg1" class="visible">
        A veces, lo más simple puede tener más intención de la que parece...
    </p>

    <p id="msg2">
        Hay momentos en los que alguien aparece sin avisar… y se queda más de lo esperado.
    </p>

    <p id="msg3">
        Y aunque no siempre se diga, hay detalles que nacen solo porque esa persona existe.
    </p>

    <div id="code" class="code"></div>

    <button id="btn" onclick="siguiente()">Descubrir más</button>

    <div id="final" class="final">
    No todo tiene que decirse para sentirse.
</div>
</div>

<script>
let paso = 1;
let codeElement = document.getElementById("code");

// función efecto escritura
function escribirCodigo(texto, i = 0) {
    if (i < texto.length) {
        codeElement.innerHTML += texto.charAt(i);
        setTimeout(() => escribirCodigo(texto, i + 1), 25);
    }
}

// primer código
function codigo1() {
    codeElement.innerHTML = "";
    escribirCodigo(`let interes = 0;

// a veces, interactuar revela más...

if (laVeo) {
    interes++;
}`);
}

// segundo código (evoluciona)
function codigo2() {
    codeElement.innerHTML = "";
    escribirCodigo(`let interes = 0;

if (laVeo) {
    interes += 10;
}

// prueba interactuar un poco más...
`);
}

// tercer código (más emocional)
function codigo3() {
    codeElement.innerHTML = "";
    escribirCodigo(`while (piensoEnElla) {
    interes++;
}`);
}

// inicial
codigo1();

function siguiente() {
    if (paso === 1) {
        document.getElementById("msg2").classList.add("visible");
        codigo2();
        paso++;
    } 
    else if (paso === 2) {
        document.getElementById("msg3").classList.add("visible");
        codigo3();

        document.getElementById("btn").style.display = "none";
        document.getElementById("final").classList.add("mostrar-final");

        paso++;
    }
}
</script>
<script>
// 🧠 hint oculto para curiosos
// hint: intenta tocar 3 veces en cualquier parte de la pantalla 👀

let taps = 0;

document.body.addEventListener("click", () => {
    taps++;

    if (taps === 3) {
        mostrarSecreto();
    }
});

function mostrarSecreto() {
    let overlay = document.createElement("div");

    overlay.style.position = "fixed";
    overlay.style.top = "0";
    overlay.style.left = "0";
    overlay.style.width = "100%";
    overlay.style.height = "100%";
    overlay.style.background = "rgba(0,0,0,0.6)";
    overlay.style.display = "flex";
    overlay.style.justifyContent = "center";
    overlay.style.alignItems = "center";
    overlay.style.zIndex = "999";

    let caja = document.createElement("div");
    caja.textContent = "A veces, lo interesante no está a simple vista.";

    caja.style.background = "white";
    caja.style.padding = "20px";
    caja.style.borderRadius = "15px";
    caja.style.fontSize = "1em";
    caja.style.textAlign = "center";
    caja.style.maxWidth = "80%";

    overlay.appendChild(caja);
    document.body.appendChild(overlay);

    setTimeout(() => {
        overlay.remove();
    }, 3500);
}
</script>

</body>
</html>

</body>
</html>
